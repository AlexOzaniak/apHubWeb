<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A-P-SmartHub</title>
    <meta name="theme-color" content="#041107" />
    <style>
      :root{--bg:#050805;--text:#e8f7ee;--muted:#9bb3a4;--green:#22c55e}
      body{margin:0;font-family:system-ui,Segoe UI,Arial;background:linear-gradient(180deg,#050805,#071008);color:var(--text)}
      .wrap{max-width:1100px;margin:40px auto;padding:0 20px}
      h1{font-size:3.2rem;margin:0 0 10px}
      .hero{display:grid;grid-template-columns:1fr 420px;gap:28px;align-items:start}
      .card{background:#0b140d;border:1px solid rgba(52,211,153,0.12);border-radius:14px;padding:18px}
      .avatar{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--green),#34d399);display:inline-grid;place-items:center;font-weight:800;color:#041107}
      .people{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
      @media(max-width:800px){.hero{grid-template-columns:1fr} .people{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <div>
          <span style="color:var(--green);font-weight:700;">SMART HOME / IOT</span>
          <h1>Simple, clean, green and focused.</h1>
          <p style="color:var(--muted);max-width:60ch">A-P-SmartHub — lightweight presentation site for the C#/.NET IoT project.</p>
          <div style="margin-top:18px"><a href="#" style="background:linear-gradient(135deg,var(--green),#34d399);color:#041107;padding:10px 16px;border-radius:999px;font-weight:700">View on GitHub</a></div>
          <section style="margin-top:28px">
            <h2>Creators</h2>
            <div class="people">
              <div class="card" role="article">
                <div style="display:flex;gap:12px;align-items:center">
                  <div class="avatar">AO</div>
                  <div>
                    <h3 style="margin:0">Alex Ozaniak</h3>
                    <div style="color:var(--muted);font-weight:700">Backend, logic</div>
                  </div>
                </div>
              </div>
              <div class="card" role="article">
                <div style="display:flex;gap:12px;align-items:center">
                  <div class="avatar">PS</div>
                  <div>
                    <h3 style="margin:0">Patrik Smrzo</h3>
                    <div style="color:var(--muted);font-weight:700">Frontend & design</div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
        <div>
          <div class="card" style="height:100%;display:grid;place-items:center">
            <svg width="100%" height="220" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect width="600" height="300" rx="18" fill="#081009"/>
              <circle cx="80" cy="80" r="48" fill="#22c55e" />
            </svg>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
